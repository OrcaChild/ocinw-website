name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest
    env:
      # Stub env vars for CI — real values live in .env.local on deploy targets.
      # These satisfy the Zod env schema so the build can complete.
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-placeholder-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "ci-placeholder-service-role-key"
      RESEND_API_KEY: "re_ci_placeholder_key"
      NEXT_PUBLIC_NOAA_API_URL: "https://api.tidesandcurrents.noaa.gov/api/prod/datagetter"
      NEXT_PUBLIC_OPEN_METEO_URL: "https://api.open-meteo.com/v1/forecast"
      NEXT_PUBLIC_ZEFFY_EMBED_URL: "https://www.zeffy.com/en-US/embed/placeholder"
      NEXT_PUBLIC_SITE_URL: "https://www.orcachildinthewild.com"
      NEXT_PUBLIC_SITE_NAME: "Orca Child in the Wild"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate content types (Velite)
        run: pnpm velite

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Build
        run: pnpm build

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck-build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
